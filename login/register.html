<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Registrasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-indigo-800 to-blue-900 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-xl shadow-2xl p-8 max-w-md w-full animate-fade-in">
        <h2 class="text-2xl font-bold text-center text-indigo-800 mb-8">Buat Akun Baru</h2>
        <form id="registerForm" class="space-y-6" novalidate>
            <div>
                <label for="username" class="block text-indigo-900 font-semibold mb-2">Nama Pengguna</label>
                <input 
                    type="text" 
                    id="username" 
                    class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-800 transition-all duration-300" 
                    placeholder="Masukkan Nama Pengguna" 
                    required
                >
                <p class="text-red-500 text-sm mt-2 hidden" id="usernameError">Nama pengguna wajib diisi.</p>
            </div>

            <div>
                <label for="email" class="block text-indigo-900 font-semibold mb-2">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-800 transition-all duration-300" 
                    placeholder="Masukkan Email" 
                    required
                >
                <p class="text-red-500 text-sm mt-2 hidden" id="emailError">Silakan masukkan alamat email yang valid.</p>
            </div>

            <div>
                <label for="password" class="block text-indigo-900 font-semibold mb-2">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-800 transition-all duration-300" 
                    placeholder="Masukkan Kata Sandi" 
                    required
                >
                <p class="text-red-500 text-sm mt-2 hidden" id="passwordError">Kata Sandi Diperlukan.</p>
            </div>

            <div>
                <label for="confirm-password" class="block text-indigo-900 font-semibold mb-2">Konfirmasi Kata Sandi</label>
                <input 
                    type="password" 
                    id="confirm-password" 
                    class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-800 transition-all duration-300" 
                    placeholder="Konfirmasi Kata Sandi" 
                    required
                >
                <p class="text-red-500 text-sm mt-2 hidden" id="confirmPasswordError">Kata Sandi Tidak Cocok</p>
            </div>

            <button 
                type="submit" 
                class="w-full bg-indigo-800 text-white py-3 rounded-lg font-semibold hover:bg-blue-900 focus:outline-none focus:ring-2 focus:ring-indigo-800 focus:ring-offset-2 transition-all duration-300 transform hover:scale-[1.02]"
            >
                Registrasi
            </button>
        </form>

        <p class="text-center text-gray-600 mt-6">
            Sudah Punya Akun? 
            <a href="index.html" class="text-indigo-800 font-semibold hover:text-blue-900 transition-colors duration-300">Sign In</a>
        </p>
    </div>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>

<p id="message"></p>
<script src="js/register.js" defer></script>
</body>
</html>
